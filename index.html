<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>纪念祠 - 3D元宇宙祭奠平台</title>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.104/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.104/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Microsoft YaHei', sans-serif; overflow: hidden; }
    #cesiumContainer { width: 100vw; height: 100vh; }
    .ui { position: absolute; z-index: 100; color: white; }
    .title { top: 20px; left: 20px; }
    .title h1 { font-size: 2rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
    .title p { opacity: 0.8; }
    
    .menu-container {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 100;
      display: none; /* 进入纪念空间后才显示 */
      flex-direction: column;
      gap: 10px;
      align-items: flex-end;
    }
    
    .menu-btn {
      padding: 10px 20px;
      font-size: 0.9rem;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 8px;
      color: white;
      cursor: pointer;
      transition: all 0.3s;
    }
    .menu-btn:hover { background: rgba(255,255,255,0.2); }
    
    .wallet-btn {
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none;
      font-weight: bold;
    }
    
    /* 首页按钮 */
    .btn-enter { 
      position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%);
      padding: 15px 40px; font-size: 1.2rem;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none; border-radius: 30px; color: white; cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    
    /* 祠堂选择按钮 */
    .temple-select-btts { 
      position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
      display: none; gap: 15px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 90vw;
    }
    .temple-btn {
      padding: 15px 25px; font-size: 1rem;
      background: rgba(255,255,255,0.2); backdrop-filter: blur(10px);
      border: 2px solid rgba(255,215,0,0.5); border-radius: 15px;
      color: white; cursor: pointer; text-align: center;
    }
    .temple-btn:hover { background: rgba(255,255,255,0.3); border-color: #ffd700; }
    .temple-btn .icon { font-size: 2rem; display: block; }
    .temple-btn .name { font-size: 0.9rem; margin-top: 5px; }
    
    /* 祭奠操作按钮 */
    .offer-btts { 
      position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
      display: none; gap: 15px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 90vw;
    }
    .offer-btn {
      padding: 12px 24px; font-size: 1rem;
      background: rgba(255,255,255,0.2); backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.3); border-radius: 12px;
      color: white; cursor: pointer;
    }
    
    .tip { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.6); font-size: 0.8rem; display: none; }
    .cesium-viewer-bottom { display: none !important; }
    
    /* 弹窗样式 */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: rgba(0,0,0,0.9);
      z-index: 2000;
      justify-content: center;
      align-items: center;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 30px;
      max-width: 90vw;
      max-height: 80vh;
      overflow-y: auto;
      color: white;
    }
    .modal h2 {
      margin-bottom: 20px;
      text-align: center;
      color: #ffd700;
    }
    .modal-close {
      position: absolute;
      top: 20px; right: 20px;
      background: none; border: none;
      color: white; font-size: 24px;
      cursor: pointer;
    }
    
    /* 祠堂卡片 */
    .temple-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }
    .temple-card {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      padding: 15px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
    }
    .temple-card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.2); }
    .temple-card .icon { font-size: 3rem; margin-bottom: 10px; }
    .temple-card .name { font-weight: bold; color: #ffd700; }
    .temple-card .count { font-size: 0.8rem; opacity: 0.7; margin-top: 5px; }
    
    /* 纪念品卡片 */
    .gift-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }
    .gift-card {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      padding: 15px;
      text-align: center;
    }
    .gift-card .icon { font-size: 2.5rem; }
    .gift-card .name { font-size: 0.9rem; margin-top: 8px; }
    .gift-card .time { font-size: 0.7rem; opacity: 0.6; margin-top: 5px; }
    
    /* 鲜花NFT */
    .nft-display { text-align: center; padding: 40px; }
    .nft-flower { font-size: 6rem; animation: float 2s ease-in-out infinite; }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
    .nft-info {
      margin-top: 20px;
      padding: 20px;
      background: rgba(255,215,0,0.1);
      border-radius: 12px;
      border: 1px solid rgba(255,215,0,0.3);
    }
    .nft-info h3 { color: #ffd700; }
    .nft-hash { font-family: monospace; font-size: 0.7rem; word-break: break-all; opacity: 0.7; margin-top: 10px; }
    
    /* 全景iframe */
    #vrFrame {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: 999;
      border: none;
    }
    #closeVr {
      display: none;
      position: fixed;
      top: 20px; right: 20px;
      z-index: 1001;
      padding: 10px 20px;
      background: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }
    
    /* 全景内的操作按钮 */
    .vr-offer-btts {
      display: none;
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1002;
      gap: 15px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 90vw;
    }
    .vr-offer-btn {
      padding: 15px 30px;
      font-size: 1.1rem;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(10px);
      border: 2px solid rgba(255,215,0,0.6);
      border-radius: 30px;
      color: white;
      cursor: pointer;
    }
    .vr-offer-btn:hover {
      background: rgba(255,215,0,0.3);
      border-color: #ffd700;
    }
    
    @media (max-width: 768px) {
      .vr-offer-btts { bottom: 20px; gap: 10px; }
      .vr-offer-btn { padding: 12px 20px; font-size: 0.9rem; }
    }
    
    /* 响应式 */
    @media (max-width: 768px) {
      /* 标题 */
      .title { top: 10px; left: 10px; }
      .title h1 { font-size: 1.3rem; }
      .title p { font-size: 0.8rem; }
      
      /* 右上角菜单 - 改为横向紧凑排列 */
      .menu-container { 
        top: 10px; right: 10px;
        flex-direction: row;
        flex-wrap: nowrap;
        gap: 3px;
      }
      .menu-btn { 
        font-size: 0.6rem; 
        padding: 5px 6px; 
        white-space: nowrap;
      }
      .wallet-btn { font-size: 0.55rem; padding: 5px 4px; }
      
      /* 首页按钮 */
      .btn-enter { 
        padding: 12px 30px; 
        font-size: 1rem;
        bottom: 80px;
      }
      
      /* 祠堂选择 - 改为横向排列 */
      .temple-select-btts { 
        bottom: 20px;
        gap: 8px;
        flex-direction: row;
        flex-wrap: nowrap;
        justify-content: center;
        max-width: 95vw;
      }
      .temple-btn { 
        padding: 8px 10px; 
        font-size: 0.7rem;
        min-width: 70px;
      }
      .temple-btn .icon { font-size: 1.2rem; }
      .temple-btn .name { font-size: 0.6rem; margin-top: 2px; }
      
      /* 祭奠按钮 - 横向排列 */
      .offer-btts { 
        bottom: 20px;
        gap: 6px;
        flex-direction: row;
        flex-wrap: nowrap;
      }
      .offer-btn { 
        padding: 8px 12px; 
        font-size: 0.75rem;
      }
      
      /* 提示文字 */
      .tip { 
        bottom: 8px; 
        font-size: 0.65rem;
      }
      
      /* 弹窗优化 */
      .modal-content {
        padding: 15px;
        border-radius: 12px;
      }
      .modal h2 { font-size: 1.2rem; }
      .temple-grid { grid-template-columns: 1fr; gap: 10px; }
      .gift-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .modal-close { top: 10px; right: 10px; font-size: 20px; }
    }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>
  
  <div class="ui title">
    <h1>🕯️ 纪念祠</h1>
    <p>3D元宇宙祭奠平台</p>
  </div>
  
  <!-- 右上角菜单（进入纪念空间后显示） -->
  <div class="menu-container" id="menuContainer">
    <button class="menu-btn wallet-btn" onclick="openWallet()">💳 SUI钱包</button>
    <button class="menu-btn" onclick="openMemorial()">📦 我的纪念品</button>
  </div>
  
  <!-- 首页按钮 -->
  <button class="ui btn-enter" id="btnEnter" onclick="enterTemple()">🚀 进入纪念空间</button>
  
  <!-- 祠堂选择（进入纪念空间后显示） -->
  <div class="ui temple-select-btts" id="templeSelect">
    <div class="temple-btn" onclick="goTo720('https://roma.720yun.com/vr/4c00784d187a5895/')">
      <span class="icon">🏛️</span>
      <span class="name">长安数字馆</span>
    </div>
    <div class="temple-btn" onclick="goTo720('https://www.720yun.com/3dm/2f2z857rnnt')">
      <span class="icon">🐉</span>
      <span class="name">闽越网无诸</span>
    </div>
    <div class="temple-btn" onclick="goTo720('https://www.720yun.com/t/82b2awaum4v?scene_id=31502')">
      <span class="icon">⛩️</span>
      <span class="name">虎门龙眼祠堂</span>
    </div>
  </div>
  
  <!-- 祭奠操作（进入祠堂后显示） -->
  <div class="ui offer-btts" id="offers">
    <button class="offer-btn" onclick="offer('花')">🌸 献花</button>
    <button class="offer-btn" onclick="offer('纸')">💰 烧纸</button>
    <button class="offer-btn" onclick="offer('香')">🕯️ 焚香</button>
  </div>
  
  <div class="ui tip" id="tip">🔗 祭奠记录已上链存证 (SUI Network)</div>
  
  <!-- 全景iframe -->
  <iframe id="vrFrame" allowfullscreen></iframe>
  <button id="closeVr" onclick="closeVr()">✕ 关闭全景</button>
  
  <!-- 全景内的献花按钮 -->
  <div class="vr-offer-btts" id="vrOffers">
    <button class="vr-offer-btn" onclick="vrOffer('花')">🌸 献花</button>
    <button class="vr-offer-btn" onclick="vrOffer('纸')">💰 烧纸</button>
    <button class="vr-offer-btn" onclick="vrOffer('香')">🕯️ 焚香</button>
  </div>

  <!-- SUI钱包弹窗 -->
  <div class="modal" id="walletModal">
    <div class="modal-content">
      <h2>💳 SUI 钱包</h2>
      <div style="text-align: center; padding: 20px;">
        <p style="margin-bottom: 15px;">连接你的SUI钱包</p>
        <button class="menu-btn wallet-btn" style="font-size: 1.1rem; padding: 15px 30px;" onclick="connectWallet()">🔗 连接钱包</button>
        <div id="walletInfo" style="display: none; margin-top: 20px;">
          <p>地址: <span id="walletAddress" style="font-family: monospace;"></span></p>
          <p style="margin-top: 10px;">余额: <span id="walletBalance" style="color: #ffd700;"></span> SUI</p>
        </div>
      </div>
      <button class="modal-close" onclick="closeModal('walletModal')">✕</button>
    </div>
  </div>

  <!-- 我的纪念品弹窗 -->
  <div class="modal" id="memorialModal">
    <div class="modal-content">
      <h2>📦 我的纪念品</h2>
      <div class="gift-grid">
        <div class="gift-card">
          <div class="icon">🌸</div>
          <div class="name">献花 x5</div>
          <div class="time">2024-01-15</div>
        </div>
        <div class="gift-card">
          <div class="icon">💰</div>
          <div class="name">烧纸 x3</div>
          <div class="time">2024-01-14</div>
        </div>
        <div class="gift-card">
          <div class="icon">🕯️</div>
          <div class="name">焚香 x7</div>
          <div class="time">2024-01-13</div>
        </div>
        <div class="gift-card">
          <div class="icon">🎁</div>
          <div class="name">鲜花NFT</div>
          <div class="time">2024-01-12</div>
        </div>
      </div>
      <button class="modal-close" onclick="closeModal('memorialModal')">✕</button>
    </div>
  </div>

  <!-- 鲜花NFT弹窗 -->
  <div class="modal" id="nftModal">
    <div class="modal-content">
      <div class="nft-display">
        <div class="nft-flower">🌸🌸🌸</div>
        <h2 style="color: #ffd700; margin-top: 20px;">🎉 鲜花NFT 已铸造</h2>
        <div class="nft-info">
          <h3>🌸 鲜花 NFT</h3>
          <p style="margin-top: 10px;">你献出的鲜花已上链存证</p>
          <div class="nft-hash">0x7f9...3a2b</div>
          <p style="margin-top: 15px; font-size: 0.9rem; opacity: 0.8;">区块链: SUI Network</p>
        </div>
        <button class="menu-btn wallet-btn" style="margin-top: 20px;" onclick="closeModal('nftModal')">确认</button>
      </div>
    </div>
  </div>

  <script>
    // Cesium Token
    Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiIyM2RlNzVmYS1iOTg2LTRkNDYtODAzOS1lYTUzOThjYWE2ZmEiLCJpZCI6NDAzNDgzLCJpYXQiOjE3NzM0NzY3NTN9.I5QiLSn5LQwvk--e2AJrluc8JJNypTCbqHJAGJIDewE';
    
    const viewer = new Cesium.Viewer('cesiumContainer', {
      terrainProvider: Cesium.createWorldTerrain(),
      animation: false,
      baseLayerPicker: false,
      fullscreenButton: false,
      vrButton: false,
      geocoder: false,
      homeButton: false,
      sceneModePicker: false,
      selectionIndicator: false,
      timeline: false,
      navigationHelpButton: false,
      scene3DOnly: true
    });

    // 初始视角 - 榆林
    viewer.camera.setView({
      destination: Cesium.Cartesian3.fromDegrees(109.55, 37.99, 20000000)
    });

    let stage = 'earth'; // earth -> temple_select -> temple

    // 进入纪念空间
    function enterTemple() {
      stage = 'temple_select';
      
      // 俯冲到地面视角
      viewer.camera.flyTo({
        destination: Cesium.Cartesian3.fromDegrees(109.55, 37.99, 8000),
        duration: 2,
        complete: function() {
          // 隐藏首页按钮，显示祠堂选择
          document.getElementById('btnEnter').style.display = 'none';
          document.getElementById('templeSelect').style.display = 'flex';
          document.getElementById('menuContainer').style.display = 'flex';
        }
      });
    }

    // 进入祠堂（选择祠堂后）
    function enterTempleScene() {
      stage = 'temple';
      
      // 添加3D祠堂模型
      addTemple();
      
      // 显示祭奠操作按钮
      document.getElementById('templeSelect').style.display = 'none';
      document.getElementById('offers').style.display = 'flex';
      document.getElementById('tip').style.display = 'block';
    }

    // 添加3D祠堂模型
    function addTemple() {
      // 祠堂主体（红色矩形）
      viewer.entities.add({
        position: Cesium.Cartesian3.fromDegrees(109.55, 37.99, 0),
        box: {
          dimensions: new Cesium.Cartesian3(200, 150, 80),
          material: Cesium.Color.fromCssColorString('#8B0000'),
          outline: true,
          outlineColor: Cesium.Color.GOLD
        }
      });

      // 屋顶（黄色）
      viewer.entities.add({
        position: Cesium.Cartesian3.fromDegrees(109.55, 37.99, 60),
        box: {
          dimensions: new Cesium.Cartesian3(220, 160, 20),
          material: Cesium.Color.GOLD
        }
      });

      // 柱子
      const offsets = [[-70,-50], [70,-50], [-70,50], [70,50]];
      offsets.forEach((off, i) => {
        viewer.entities.add({
          position: Cesium.Cartesian3.fromDegrees(109.55 + off[0]*0.0001, 37.99 + off[1]*0.0001, 20),
          cylinder: {
            length: 60,
            topRadius: 5,
            bottomRadius: 5,
            material: Cesium.Color.fromCssColorString('#8B0000')
          }
        });
      });

      // 牌匾
      viewer.entities.add({
        position: Cesium.Cartesian3.fromDegrees(109.55, 37.995, 70),
        box: {
          dimensions: new Cesium.Cartesian3(80, 10, 15),
          material: Cesium.Color.BLACK
        }
      });
    }

    // 弹窗控制
    function openWallet() {
      document.getElementById('walletModal').classList.add('active');
    }
    
    function openMemorial() {
      document.getElementById('memorialModal').classList.add('active');
    }
    
    function closeModal(id) {
      document.getElementById(id).classList.remove('active');
    }
    
    // 连接钱包（模拟）
    function connectWallet() {
      document.getElementById('walletAddress').textContent = '0x7f9...3a2b';
      document.getElementById('walletBalance').textContent = '1,234.56';
      document.getElementById('walletInfo').style.display = 'block';
    }

    // 进入720全景
    function goTo720(url) {
      document.getElementById('vrFrame').src = url;
      document.getElementById('vrFrame').style.display = 'block';
      document.getElementById('closeVr').style.display = 'block';
      document.getElementById('vrOffers').style.display = 'flex';
      
      // 进入祠堂场景
      enterTempleScene();
    }

    function closeVr() {
      document.getElementById('vrFrame').style.display = 'none';
      document.getElementById('vrFrame').src = '';
      document.getElementById('closeVr').style.display = 'none';
      document.getElementById('vrOffers').style.display = 'none';
    }
    
    // 全景内献花
    function vrOffer(type) {
      if (type === '花') {
        document.getElementById('nftModal').classList.add('active');
      } else {
        alert('献' + type + '成功！已链上存证到SUI网络');
      }
    }

    function offer(type) {
      const emojis = ['🌸', '💰', '🕯️'];
      const emoji = emojis[['花','纸','香'].indexOf(type)];
      
      for(let i=0; i<10; i++) {
        setTimeout(() => {
          viewer.entities.add({
            position: Cesium.Cartesian3.fromDegrees(109.55, 37.99, 100 + i*5),
            point: {
              pixelSize: 30,
              color: Cesium.Color.WHITE.withAlpha(0.8)
            },
            description: emoji
          });
        }, i * 200);
      }
      
      if (type === '花') {
        setTimeout(() => {
          document.getElementById('nftModal').classList.add('active');
        }, 1500);
      }
      
      alert('献' + type + '成功！已链上存证到SUI网络');
    }
  </script>
</body>
</html>

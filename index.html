<html lang="zh-CN">
<head>

  <link href="https://cesium.com/downloads/cesiumjs/releases/1.104/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <style>
    * { 
      margin: 0; padding: 0; box-sizing: border-box;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    body { font-family: 'Microsoft YaHei', sans-serif; overflow: hidden; }
    #cesiumContainer { width: 100vw; height: 100vh; }
    .ui { position: absolute; z-index: 100; color: white; }
    .title { top: 20px; left: 20px; }
    .title h1 { font-size: 2rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
    .title p { opacity: 0.8; }
    
    .menu-container {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 100;
      display: none; /* 进入纪念空间后才显示 */
      flex-direction: column;
      gap: 10px;
      align-items: flex-end;
    }
    
    .menu-btn {
      padding: 12px 18px;
      font-size: 14px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 10px;
      color: white;
      cursor: pointer;
      transition: all 0.3s;
      min-height: 44px; /* 触摸友好最小高度 */
      min-width: 44px;
    }
    .menu-btn:hover { background: rgba(255,255,255,0.25); }
    
    .wallet-btn {
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none;
      font-weight: bold;
    }
    
    /* 首页按钮 - 更大更醒目 */
    .btn-enter { 
      position: absolute; bottom: 15%;
      left: 50%; transform: translateX(-50%);
      padding: 18px 50px;
      font-size: 18px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none; border-radius: 50px; 
      color: white; cursor: pointer;
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
      min-height: 56px;
    }
    .btn-enter:active { transform: translateX(-50%) scale(0.96); }
    
    /* 祠堂选择按钮 - 大卡片 */
    .temple-select-btts { 
      position: absolute; bottom: 12%;
      left: 50%; transform: translateX(-50%);
      display: none; gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 95%;
    }
    .temple-btn {
      padding: 20px 30px;
      font-size: 16px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);
      border: 2px solid rgba(255,215,0,0.6);
      border-radius: 20px;
      color: white; 
      cursor: pointer; 
      text-align: center;
      min-width: 120px;
      min-height: 80px;
    }
    .temple-btn:hover { background: rgba(255,255,255,0.25); border-color: #ffd700; }
    .temple-btn:active { transform: scale(0.95); }
    .temple-btn .icon { font-size: 32px; display: block; margin-bottom: 8px; }
    .temple-btn .name { font-size: 14px; font-weight: 500; }
    
    /* 祭奠操作按钮 - 大按钮 */
    .offer-btts { 
      position: absolute; bottom: 12%;
      left: 50%; transform: translateX(-50%);
      display: none; gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 95%;
    }
    .offer-btn {
      padding: 16px 32px;
      font-size: 16px;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(12px);
      border: 2px solid rgba(255,255,255,0.4);
      border-radius: 16px;
      color: white; 
      cursor: pointer;
      min-height: 52px;
      min-width: 80px;
    }
    .offer-btn:hover { background: rgba(255,255,255,0.3); }
    .offer-btn:active { transform: scale(0.95); }
    
    .tip { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.6); font-size: 0.8rem; display: none; }
    .cesium-viewer-bottom { display: none !important; }
    
    /* 音乐控制按钮 */
    .music-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 1000;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: rgba(0,0,0,0.7);
      border: 2px solid rgba(255,215,0,0.6);
      color: white;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .music-btn:active { transform: scale(0.95); }
    
    /* 弹幕样式 */
    .danmu-container {
      display: none;
      position: fixed;
      top: 50%;
      left: 15px;
      transform: translateY(-50%);
      width: 180px;
      max-height: 35vh;
      z-index: 101;
      overflow: hidden;
      padding: 25px 0;
    }
    .danmu-container::before,
    .danmu-container::after {
      content: '';
      position: absolute;
      left: 0;
      width: 100%;
      height: 30px;
      pointer-events: none;
      z-index: 10;
    }
    .danmu-container::before {
      top: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%);
    }
    .danmu-container::after {
      bottom: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 100%);
    }
    .danmu-item {
      padding: 6px 10px;
      margin-bottom: 8px;
      background: rgba(0,0,0,0.65);
      border-radius: 15px;
      color: white;
      font-size: 12px;
      animation: danmuFade 6s ease-out forwards;
      opacity: 0;
    }
    @keyframes danmuFade {
      0% { opacity: 0; transform: translateY(15px); }
      10% { opacity: 1; transform: translateY(0); }
      80% { opacity: 1; }
      100% { opacity: 0; }
    }
    
    /* 滚动弹幕 */
    .danmu-container {
      display: none;
      position: fixed;
      top: 50%;
      left: 20px;
      transform: translateY(-50%);
      width: 200px;
      max-height: 40vh;
      z-index: 100;
      overflow: hidden;
      padding: 30px 0;
    }
    /* 上下透明渐变遮罩 */
    .danmu-container::before,
    .danmu-container::after {
      content: '';
      position: absolute;
      left: 0;
      width: 100%;
      height: 40px;
      pointer-events: none;
      z-index: 10;
    }
    .danmu-container::before {
      top: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 100%);
    }
    .danmu-container::after {
      bottom: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 100%);
    }
    .danmu-item {
      padding: 8px 12px;
      margin-bottom: 10px;
      background: rgba(0,0,0,0.6);
      border-radius: 20px;
      color: white;
      font-size: 13px;
      white-space: nowrap;
      animation: danmuFade 6s ease-out forwards;
      opacity: 0;
    }
    @keyframes danmuFade {
      0% { opacity: 0; transform: translateY(20px); }
      10% { opacity: 1; transform: translateY(0); }
      80% { opacity: 1; }
      100% { opacity: 0; }
    }
    
    @media (max-width: 768px) {
      .danmu-container {
        left: 10px;
        width: 150px;
        max-height: 30vh;
      }
      .danmu-item { font-size: 11px; padding: 6px 10px; }
      .danmu-container::before,
      .danmu-container::after { height: 25px; }
    }
    
    /* 弹窗样式 */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: rgba(0,0,0,0.9);
      z-index: 2000;
      justify-content: center;
      align-items: center;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 30px;
      max-width: 90vw;
      max-height: 80vh;
      overflow-y: auto;
      color: white;
    }
    .modal h2 {
      margin-bottom: 20px;
      text-align: center;
      color: #ffd700;
    }
    .modal-close {
      position: absolute;
      top: 20px; right: 20px;
      background: none; border: none;
      color: white; font-size: 24px;
      cursor: pointer;
    }
    
    /* 祠堂卡片 */
    .temple-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }
    .temple-card {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      padding: 15px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
    }
    .temple-card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.2); }
    .temple-card .icon { font-size: 3rem; margin-bottom: 10px; }
    .temple-card .name { font-weight: bold; color: #ffd700; }
    .temple-card .count { font-size: 0.8rem; opacity: 0.7; margin-top: 5px; }
    
    /* 纪念品卡片 */
    .gift-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }
    .gift-card {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      padding: 15px;
      text-align: center;
    }
    .gift-card .icon { font-size: 2.5rem; }
    .gift-card .name { font-size: 0.9rem; margin-top: 8px; }
    .gift-card .time { font-size: 0.7rem; opacity: 0.6; margin-top: 5px; }
    
    /* 鲜花NFT */
    .nft-display { text-align: center; padding: 40px; }
    .nft-flower { font-size: 6rem; animation: float 2s ease-in-out infinite; }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
    .nft-info {
      margin-top: 20px;
      padding: 20px;
      background: rgba(255,215,0,0.1);
      border-radius: 12px;
      border: 1px solid rgba(255,215,0,0.3);
    }
    .nft-info h3 { color: #ffd700; }
    .nft-hash { font-family: monospace; font-size: 0.7rem; word-break: break-all; opacity: 0.7; margin-top: 10px; }
    
    /* 全景iframe */
    #vrFrame {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: 999;
      border: none;
    }
    #closeVr {
      display: none;
      position: fixed;
      top: 20px; right: 20px;
      z-index: 1001;
      padding: 12px 24px;
      background: #fff;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 500;
      min-height: 44px;
      min-width: 44px;
    }
    #closeVr:active { background: #eee; }
    
    @media (max-width: 768px) {
      #closeVr {
        top: 12px; right: 12px;
        padding: 10px 18px;
        font-size: 14px;
      }
    }
    
    /* 全景内的操作按钮 */
    .vr-offer-btts {
      display: none;
      position: fixed;
      bottom: 5%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1002;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      width: 90%;
    }
    .vr-offer-btn {
      flex: 1;
      min-width: 100px;
      padding: 16px 24px;
      font-size: 16px;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(12px);
      border: 2px solid rgba(255,215,0,0.6);
      border-radius: 30px;
      color: white;
      cursor: pointer;
      min-height: 52px;
    }
    .vr-offer-btn:hover {
      background: rgba(255,215,0,0.3);
      border-color: #ffd700;
    }
    .vr-offer-btn:active { transform: scale(0.95); }
    
    /* 响应式 - 手机端适配 */
    @media (max-width: 768px) {
      /* 标题 */
      .title { top: 8px; left: 10px; }
      .title h1 { font-size: 1.2rem; }
      .title p { font-size: 0.7rem; }
      
      /* 右上角菜单 - 横向紧凑排列 */
      .menu-container { 
        top: 8px; right: 8px;
        flex-direction: row;
        flex-wrap: nowrap;
        gap: 4px;
      }
      .menu-btn { 
        font-size: 11px; 
        padding: 6px 8px; 
        white-space: nowrap;
        min-height: 36px;
      }
      .wallet-btn { font-size: 10px; padding: 6px 6px; }
      
      /* 首页按钮 - 触摸友好 */
      .btn-enter { 
        padding: 14px 36px; 
        font-size: 16px;
        bottom: 18%;
        min-height: 50px;
      }
      
      /* 祠堂选择 - 卡片横向排列 */
      .temple-select-btts { 
        bottom: 15%;
        gap: 10px;
        flex-direction: row;
        flex-wrap: nowrap;
        justify-content: center;
        width: 92%;
      }
      .temple-btn { 
        flex: 1;
        padding: 12px 8px; 
        font-size: 12px;
        min-width: 0;
        min-height: 70px;
      }
      .temple-btn .icon { font-size: 24px; margin-bottom: 4px; }
      .temple-btn .name { font-size: 11px; margin-top: 2px; }
      
      /* 祭奠按钮 - 横向等宽排列 */
      .offer-btts { 
        bottom: 12%;
        gap: 10px;
        flex-direction: row;
        flex-wrap: nowrap;
        width: 92%;
      }
      .offer-btn { 
        flex: 1;
        padding: 12px 8px; 
        font-size: 13px;
        min-width: 0;
        min-height: 44px;
      }
      
      /* 提示文字 */
      .tip { 
        bottom: 8px; 
        font-size: 0.65rem;
      }
      
      /* 弹窗优化 */
      .modal-content {
        padding: 15px;
        border-radius: 12px;
      }
      .modal h2 { font-size: 1.2rem; }
      .temple-grid { grid-template-columns: 1fr; gap: 10px; }
      .gift-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .modal-close { top: 10px; right: 10px; font-size: 20px; }
    }
  </style>
</head>

    function toggleMusic() {
      if (musicPlaying) {
        bgm.pause();
        musicBtn.textContent = '🔇';
      } else {

      homeButton: false,
      sceneModePicker: false,
      selectionIndicator: false,
      timeline: false,
      navigationHelpButton: false,
      scene3DOnly: true
    });

    // 初始视角 - 榆林
    viewer.camera.setView({
      destination: Cesium.Cartesian3.fromDegrees(109.55, 37.99, 20000000)
    });

    let stage = 'earth'; // earth -> temple_select -> temple

    // 进入纪念空间
    function enterTemple() {
      stage = 'temple_select';
      
      // 俯冲到地面视角
      viewer.camera.flyTo({
        destination: Cesium.Cartesian3.fromDegrees(109.55, 37.99, 8000),
        duration: 2,
        complete: function() {
          // 隐藏首页按钮，显示祠堂选择
          document.getElementById('btnEnter').style.display = 'none';
          document.getElementById('templeSelect').style.display = 'flex';
          document.getElementById('menuContainer').style.display = 'flex';
        }
      });
    }

    // 进入祠堂（选择祠堂后）
    function enterTempleScene() {
      stage = 'temple';
      
      // 添加3D祠堂模型
      addTemple();
      
      // 显示祭奠操作按钮
      document.getElementById('templeSelect').style.display = 'none';
      document.getElementById('offers').style.display = 'flex';
      document.getElementById('tip').style.display = 'block';
      
      // 开始弹幕
      startDanmu();
    }

    // 添加3D祠堂模型
    function addTemple() {
      // 祠堂主体（红色矩形）
      viewer.entities.add({
        position: Cesium.Cartesian3.fromDegrees(109.55, 37.99, 0),
        box: {
          dimensions: new Cesium.Cartesian3(200, 150, 80),
          material: Cesium.Color.fromCssColorString('#8B0000'),
          outline: true,
          outlineColor: Cesium.Color.GOLD
        }
      });

      // 屋顶（黄色）
      viewer.entities.add({
        position: Cesium.Cartesian3.fromDegrees(109.55, 37.99, 60),
        box: {
          dimensions: new Cesium.Cartesian3(220, 160, 20),
          material: Cesium.Color.GOLD
        }
      });

      // 柱子
      const offsets = [[-70,-50], [70,-50], [-70,50], [70,50]];
      offsets.forEach((off, i) => {
        viewer.entities.add({
          position: Cesium.Cartesian3.fromDegrees(109.55 + off[0]*0.0001, 37.99 + off[1]*0.0001, 20),
          cylinder: {
            length: 60,
            topRadius: 5,
            bottomRadius: 5,
            material: Cesium.Color.fromCssColorString('#8B0000')
          }
        });
      });

      // 牌匾
      viewer.entities.add({
        position: Cesium.Cartesian3.fromDegrees(109.55, 37.995, 70),
        box: {
          dimensions: new Cesium.Cartesian3(80, 10, 15),
          material: Cesium.Color.BLACK
        }
      });
    }

    // 弹窗控制
    function openWallet() {
      document.getElementById('walletModal').classList.add('active');
    }
    
    function openMemorial() {
      document.getElementById('memorialModal').classList.add('active');
    }
    
    function closeModal(id) {
      document.getElementById(id).classList.remove('active');
    }
    
    // 连接钱包（模拟）
    function connectWallet() {
      document.getElementById('walletAddress').textContent = '0x7f9...3a2b';
      document.getElementById('walletBalance').textContent = '1,234.56';
      document.getElementById('walletInfo').style.display = 'block';
    }

    // 进入720全景
    function goTo720(url) {
      document.getElementById('vrFrame').src = url;
      document.getElementById('vrFrame').style.display = 'block';
      document.getElementById('closeVr').style.display = 'block';
      document.getElementById('vrOffers').style.display = 'flex';
      
      // 进入祠堂场景并启动弹幕
      enterTempleScene();
      startDanmu();
    }

    function closeVr() {
      // 停止弹幕
      stopDanmu();
      // 关闭VR
      document.getElementById('vrFrame').style.display = 'none';
      document.getElementById('vrFrame').src = '';
      document.getElementById('closeVr').style.display = 'none';
      document.getElementById('vrOffers').style.display = 'none';
    }
    
    // 全景内献花
    function vrOffer(type) {
      if (type === '花') {
        document.getElementById('nftModal').classList.add('active');
      } else {
        alert('献' + type + '成功！已链上存证到SUI网络');
      }
    }
    
    // 返回祠堂选择
    function backToCollection() {
      closeModal('nftModal');
      closeVr();
      // 显示祠堂选择
      document.getElementById('templeSelect').style.display = 'flex';
      document.getElementById('offers').style.display = 'none';
      document.getElementById('tip').style.display = 'none';
      stage = 'temple_select';
    }

    function offer(type) {
      const emojis = ['🌸', '💰', '🕯️'];
      const emoji = emojis[['花','纸','香'].indexOf(type)];
      
      for(let i=0; i<10; i++) {
        setTimeout(() => {
          viewer.entities.add({
            position: Cesium.Cartesian3.fromDegrees(109.55, 37.99, 100 + i*5),
            point: {
              pixelSize: 30,
              color: Cesium.Color.WHITE.withAlpha(0.8)
            },
            description: emoji
          });
        }, i * 200);
      }
      
      if (type === '花') {
        setTimeout(() => {
          document.getElementById('nftModal').classList.add('active');
        }, 1500);
      }
      
      alert('献' + type + '成功！已链上存证到SUI网络');
    }
    
    // 弹幕功能
    const danmuNames = ['张三', '李四', '王五', '赵六', '孙七', '周八', '吴九', '郑十', '钱十一', '陈十二', '刘十三', '杨十四', '常少', '网友***888'];
    const danmuActions = ['献花', '焚香', '烧纸'];
    let danmuTimer = null;
    
    function showDanmuItem() {
      const container = document.getElementById('danmuContainer');
      const name = danmuNames[Math.floor(Math.random() * danmuNames.length)];
      const hour = Math.floor(Math.random() * 24);
      const min = Math.floor(Math.random() * 60);
      const action = danmuActions[Math.floor(Math.random() * danmuActions.length)];
      
      const item = document.createElement('div');
      item.className = 'danmu-item';
      item.innerHTML = `${name} · ${hour.toString().padStart(2,'0')}:${min.toString().padStart(2,'0')}<br>来过祠堂 ${action}`;
      container.appendChild(item);
      
      setTimeout(() => { if(item.parentNode) item.parentNode.removeChild(item); }, 6000);
    }
    
    function startDanmu() {
      document.getElementById('danmuContainer').style.display = 'block';
      showDanmuItem();
      showDanmuItem();
      showDanmuItem();
      danmuTimer = setInterval(showDanmuItem, 2500);
    }
    
    function stopDanmu() {
      if (danmuTimer) { clearInterval(danmuTimer); danmuTimer = null; }
      document.getElementById('danmuContainer').innerHTML = '';
      document.getElementById('danmuContainer').style.display = 'none';
    }
  </script>
</body>
</html>
